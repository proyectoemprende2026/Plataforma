<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Operativa - FondeoEmprende2026</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --azul: #0a192f; --dorado: #d4af37; --verde: #004d40; --gris-f: #f8f9fa; }
        body { background: var(--gris-f); font-family: 'Segoe UI', sans-serif; }
        
        /* Navbar con funcionalidad de retorno */
        .navbar { background: var(--azul); border-bottom: 3px solid var(--dorado); padding: 10px 0; }
        .navbar-brand { cursor: pointer; transition: 0.3s; }
        .navbar-brand:hover { opacity: 0.8; transform: scale(1.02); }
        .navbar-brand img { height: 50px; background: white; padding: 2px; border-radius: 5px; }
        
        .card-custom { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); background: white; margin-bottom: 20px; }
        .btn-3d { background: var(--verde); color: white; border: none; padding: 12px; border-bottom: 4px solid #002b24; font-weight: bold; border-radius: 12px; transition: 0.2s; }
        .btn-3d:active { transform: translateY(3px); border-bottom: 0; }
        .section-hidden { display: none !important; }
        
        /* Estilos Admin */
        .admin-row { font-size: 0.85rem; vertical-align: middle; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-weight: bold; }
        
        #asistente-btn { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; border-radius: 50%; background: var(--dorado); color: var(--azul); border: none; box-shadow: 0 5px 20px rgba(0,0,0,0.3); font-size: 30px; z-index: 2000; cursor: pointer; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center" href="https://proyectoemprende2026.github.io/Principal/">
            <img src="https://raw.githubusercontent.com/proyectoemprende2026/Plataforma/main/LogoFondeoEmprende2026.jpg" alt="Logo">
            <span class="ms-3 fw-bold d-none d-sm-inline text-white">FondeoEmprende2026</span>
        </a>
        <div class="d-flex gap-2">
            <button onclick="navegar('pantalla-login')" class="btn btn-outline-warning btn-sm fw-bold">YA TENGO MI PIN</button>
            <button onclick="accesoAdmin()" class="btn btn-sm btn-light fw-bold">ADMIN</button>
        </div>
    </div>
</nav>

<div class="container mt-4 pb-5">

    <div id="pantalla-registro" class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card card-custom p-4 text-center">
                <h3 class="fw-bold mb-4">Registro de Beneficiario</h3>
                <div class="row g-3 text-start">
                    <div class="col-sm-6"><label class="small fw-bold">Nombre</label><input type="text" id="reg-nombre" class="form-control" placeholder="Nombre(s)"></div>
                    <div class="col-sm-6"><label class="small fw-bold">Apellidos</label><input type="text" id="reg-apellidos" class="form-control" placeholder="Apellidos"></div>
                    <div class="col-12"><label class="small fw-bold">Nombre del Proyecto</label><input type="text" id="proy-nombre" class="form-control" placeholder="Ej. Expansión Tecnológica"></div>
                    <div class="col-12"><label class="small fw-bold">Link Drive Proyecto</label><input type="url" id="reg-link-proyecto" class="form-control" placeholder="https://drive.google.com/..."></div>
                </div>
                <div class="mt-4 p-3 bg-light rounded-4 border">
                    <h6 class="fw-bold small">Definir Partidas Presupuestales</h6>
                    <div class="input-group mb-2">
                        <input type="text" id="partida-input" class="form-control" placeholder="Ej: Maquinaria">
                        <button onclick="addPartida()" class="btn btn-dark">Añadir</button>
                    </div>
                    <ul id="lista-partidas" class="text-start small text-muted"></ul>
                </div>
                <button onclick="crearCuenta()" class="btn btn-3d w-100 mt-4">GENERAR ACCESO</button>
            </div>
        </div>
    </div>

    <div id="pantalla-login" class="row justify-content-center section-hidden">
        <div class="col-md-5">
            <div class="card card-custom p-4 text-center">
                <h4 class="fw-bold">Acceso Clientes</h4>
                <p class="text-muted small">Ingresa tu PIN de 4 dígitos</p>
                <input type="text" id="login-pin" class="form-control form-control-lg text-center fs-2 fw-bold mb-4" maxlength="4" placeholder="0000">
                <button onclick="validarPin()" class="btn btn-3d w-100">ENTRAR AL DASHBOARD</button>
                <button onclick="navegar('pantalla-registro')" class="btn btn-link btn-sm mt-3 text-secondary text-decoration-none">← Volver al Registro</button>
            </div>
        </div>
    </div>

    <div id="pantalla-dashboard" class="section-hidden">
        <div class="row">
            <div class="col-lg-5">
                <div class="card card-custom p-4 text-center">
                    <h5 id="dash-user-name" class="fw-bold text-uppercase">--</h5>
                    <p class="small text-muted mb-4" id="dash-proy-name">--</p>
                    <h2 id="dash-saldo" class="fw-bold display-6 mb-4">$13,500,000.00</h2>
                    <div style="height: 250px;"><canvas id="mainChart"></canvas></div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="card card-custom p-4 border-top border-4 border-success">
                    <h6 class="fw-bold mb-3">SUBIR COMPROBACIÓN FISCAL</h6>
                    <div class="row g-2 text-start">
                        <div class="col-md-6"><label class="small fw-bold">Partida</label><select id="dash-sel-partida" class="form-select"></select></div>
                        <div class="col-md-6"><label class="small fw-bold">Monto MXN</label><input type="number" id="dash-monto" class="form-control" placeholder="0.00"></div>
                        <div class="col-12"><label class="small fw-bold">Enlace Comprobante (Drive)</label><input type="url" id="dash-link" class="form-control" placeholder="https://drive.google.com/..."></div>
                        <button onclick="subirGasto()" class="btn btn-3d w-100 mt-3">ACTUALIZAR SALDO</button>
                    </div>
                </div>
                <div class="card card-custom p-4">
                    <h6 class="fw-bold mb-3">HISTORIAL</h6>
                    <div class="table-responsive">
                        <table class="table table-sm align-middle">
                            <tbody id="tabla-body" class="small"></tbody>
                        </table>
                    </div>
                    <button onclick="cerrarDashboard()" class="btn btn-danger w-100 fw-bold mt-3">CERRAR SESIÓN</button>
                </div>
            </div>
        </div>
    </div>

    <div id="pantalla-admin" class="section-hidden">
        <div class="card card-custom p-4 shadow-lg">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                <h4 class="fw-bold text-navy mb-0">Panel Maestro de Auditoría</h4>
                <button onclick="navegar('pantalla-registro')" class="btn btn-sm btn-secondary">Salir de Admin</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-dark small">
                        <tr>
                            <th>Beneficiario</th>
                            <th>Proyecto</th>
                            <th>PIN</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="admin-row">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
// CONFIG FIREBASE
const firebaseConfig = { apiKey: "AIzaSyA1T0OaksBYi9-E9MlIUJvKnoQ2e6uOCx8", authDomain: "proyectoemprende26.firebaseapp.com", projectId: "proyectoemprende26", storageBucket: "proyectoemprende26.firebasestorage.app", messagingSenderId: "57446946914", appId: "1:57446946914:web:cf9ff716e038b866d8193b" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let v_partidas = []; let v_user = null; let v_chart = null;

function navegar(id) {
    document.getElementById('pantalla-registro').classList.add('section-hidden');
    document.getElementById('pantalla-login').classList.add('section-hidden');
    document.getElementById('pantalla-dashboard').classList.add('section-hidden');
    document.getElementById('pantalla-admin').classList.add('section-hidden');
    if(document.getElementById('pantalla-exito')) document.getElementById('pantalla-exito').classList.add('section-hidden');
    
    document.getElementById(id).classList.remove('section-hidden');
}

function addPartida() { const i = document.getElementById('partida-input'); if(i.value) { v_partidas.push(i.value); document.getElementById('lista-partidas').innerHTML += `<li>• ${i.value}</li>`; i.value = ''; } }

async function crearCuenta() {
    const nom = document.getElementById('reg-nombre').value;
    const proy = document.getElementById('proy-nombre').value;
    const pin = Math.floor(1000 + Math.random() * 9000).toString();
    if(!nom || v_partidas.length === 0) return alert("Faltan datos.");
    await db.collection("usuarios").doc(pin).set({ nombre: nom, proyecto: proy, pin: pin, partidas: v_partidas, gastos: [], saldoInicial: 13500000, bloqueado: false });
    alert("Usuario Creado. Tu PIN es: " + pin);
    navegar('pantalla-login');
}

async function validarPin() {
    const pin = document.getElementById('login-pin').value;
    const doc = await db.collection("usuarios").doc(pin).get();
    if(doc.exists) {
        v_user = doc.data();
        if(v_user.bloqueado) return alert("Acceso bloqueado por auditoría.");
        document.getElementById('dash-user-name').innerText = v_user.nombre;
        document.getElementById('dash-proy-name').innerText = v_user.proyecto;
        const sel = document.getElementById('dash-sel-partida'); sel.innerHTML = '';
        v_user.partidas.forEach(p => { sel.add(new Option(p, p)); });
        actualizarUI(); navegar('pantalla-dashboard');
    } else { alert("PIN incorrecto."); }
}

function actualizarUI() {
    const gastado = v_user.gastos.reduce((a, b) => a + b.monto, 0);
    const saldo = 13500000 - gastado;
    document.getElementById('dash-saldo').innerText = "$" + saldo.toLocaleString('es-MX', {minimumFractionDigits:2});
    const body = document.getElementById('tabla-body'); body.innerHTML = '';
    v_user.gastos.slice().reverse().forEach(g => { body.innerHTML += `<tr><td>${g.partida}</td><td>$${g.monto.toLocaleString()}</td><td><a href="${g.link}" target="_blank">🔗</a></td></tr>`; });
    const ctx = document.getElementById('mainChart').getContext('2d');
    if(v_chart) v_chart.destroy();
    v_chart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Disponible', 'Ejercido'], datasets: [{ data: [saldo, gastado], backgroundColor: ['#0a192f', '#d4af37'], borderWidth: 0 }] }, options: { maintainAspectRatio: false } });
}

// CORRECCIÓN PANEL ADMIN
function accesoAdmin() {
    const pass = prompt("Clave Auditor:");
    if(pass === "Admin100583") {
        navegar('pantalla-admin');
        cargarUsuariosAdmin();
    } else {
        alert("Clave incorrecta.");
    }
}

async function cargarUsuariosAdmin() {
    const tbody = document.getElementById('admin-table-body');
    tbody.innerHTML = '<tr><td colspan="5" class="text-center">Cargando base de datos...</td></tr>';
    
    try {
        const snapshot = await db.collection("usuarios").get();
        tbody.innerHTML = '';
        snapshot.forEach(doc => {
            const u = doc.data();
            const row = `
                <tr>
                    <td><strong class="text-navy">${u.nombre}</strong></td>
                    <td>${u.proyecto}</td>
                    <td><span class="badge bg-light text-dark border">PIN: ${u.pin}</span></td>
                    <td>
                        <span class="status-badge ${u.bloqueado ? 'bg-danger text-white' : 'bg-success text-white'}">
                            ${u.bloqueado ? 'BLOQUEADO' : 'ACTIVO'}
                        </span>
                    </td>
                    <td>
                        <button onclick="toggleBloqueo('${u.pin}', ${u.bloqueado})" class="btn btn-sm btn-dark">
                            ${u.bloqueado ? 'Desbloquear' : 'Bloquear'}
                        </button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    } catch (e) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-danger text-center">Error al cargar datos.</td></tr>';
    }
}

async function toggleBloqueo(pin, estadoActual) {
    if(confirm("¿Cambiar el estado de acceso para este usuario?")) {
        await db.collection("usuarios").doc(pin).update({ bloqueado: !estadoActual });
        cargarUsuariosAdmin(); // Recargar tabla
    }
}

function cerrarDashboard() { v_user = null; document.getElementById('login-pin').value = ''; navegar('pantalla-login'); }

</script>
</body>
</html>
